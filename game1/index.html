<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アクションゲーム - 箱根ゲームクリエイター</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden; /* スクロールバーを出さない */
        }
        #game-container {
            width: 100vw;
            height: 100vh;
        }
        /* バーチャルパッドのスタイル */
        #virtual-pad {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            height: 150px;
            pointer-events: none; /* コンテナ自体はクリック判定なし */
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 100;
        }
        .pad-btn {
            pointer-events: auto; /* ボタン部分はクリック可能 */
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            color: white;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
        }
        .pad-btn:active {
            background: rgba(255, 255, 255, 0.5);
        }
        #dpad {
            position: relative;
            width: 150px;
            height: 150px;
        }
        #dpad .pad-btn {
            position: absolute;
            width: 50px;
            height: 50px;
        }
        #btn-up { top: 0; left: 50px; }
        #btn-down { bottom: 0; left: 50px; }
        #btn-left { top: 50px; left: 0; }
        #btn-right { top: 50px; right: 0; }

        #action-pad {
            position: relative;
            width: 150px;
            height: 150px;
        }
        #action-pad .pad-btn {
            position: absolute;
            width: 60px;
            height: 60px;
            font-size: 16px;
        }
        #btn-b { bottom: 20px; left: 0; background: rgba(255,0,0,0.3); border-color: rgba(255,0,0,0.5);}
        #btn-a { top: 20px; right: 0; background: rgba(0,255,0,0.3); border-color: rgba(0,255,0,0.5);}

        /* タッチ非対応（マウス操作のみ）のPC環境では隠す */
        @media (hover: hover) and (pointer: fine) {
            #virtual-pad {
                display: none;
            }
        }
    </style>
    <!-- Phaser 3 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>

    <div id="game-container"></div>
    
    <!-- バーチャルパッド -->
    <div id="virtual-pad">
        <div id="dpad">
            <div id="btn-up" class="pad-btn">▲</div>
            <div id="btn-down" class="pad-btn">▼</div>
            <div id="btn-left" class="pad-btn">◀</div>
            <div id="btn-right" class="pad-btn">▶</div>
        </div>
        <div id="action-pad">
            <div id="btn-b" class="pad-btn">B</div>
            <div id="btn-a" class="pad-btn">A</div>
        </div>
    </div>
    
    <!-- ゲームのメインロジック -->
    <script src="js/game.js"></script>
</body>
</html>
