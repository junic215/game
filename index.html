<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>箱根ゲームクリエイター</title>
    <!-- SFC風ピクセルフォントの読み込み -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="pixel-text shadow-text">箱根ゲームクリエイター</h1>
            <p class="subtitle pixel-text">1つのページで6つのゲームが遊べるよ！</p>
        </header>

        <main>
            <div class="game-grid">
                <!-- 1つ目のゲーム（そのまま遊べる） -->
                <div class="game-card">
                    <div class="game-screen playable" id="game-container-1">
                        <iframe src="game1/index.html" id="game-iframe-1" width="100%" height="100%" frameborder="0" scrolling="no"></iframe>
                        <button class="fullscreen-btn" onclick="toggleFullScreen('game-iframe-1')">⛶ 全画面</button>
                    </div>
                    <div class="game-info">
                        <h2 class="pixel-text">アクションゲーム</h2>
                        <p class="pixel-text">マリオ風！ファイアで敵をたおせ！</p>
                    </div>
                </div>

                <!-- 2つ目のゲーム -->
                <div class="game-card">
                    <div class="game-screen playable" id="game-container-2">
                        <iframe src="game2/index.html" id="game-iframe-2" width="100%" height="100%" frameborder="0" scrolling="no"></iframe>
                        <button class="fullscreen-btn" onclick="toggleFullScreen('game-iframe-2')">⛶ 全画面</button>
                    </div>
                    <div class="game-info">
                        <h2 class="pixel-text">しらいっち</h2>
                        <p class="pixel-text">育成ゲーム！ごはんや掃除でお世話しよう！</p>
                    </div>
                </div>

                <div class="game-card locked">
                    <div class="game-screen locked-bg"><span class="question-mark">?</span></div>
                    <div class="game-info"><h2 class="pixel-text">Coming Soon...</h2></div>
                </div>

                <div class="game-card locked">
                    <div class="game-screen locked-bg"><span class="question-mark">?</span></div>
                    <div class="game-info"><h2 class="pixel-text">Coming Soon...</h2></div>
                </div>

                <div class="game-card locked">
                    <div class="game-screen locked-bg"><span class="question-mark">?</span></div>
                    <div class="game-info"><h2 class="pixel-text">Coming Soon...</h2></div>
                </div>

                <div class="game-card locked">
                    <div class="game-screen locked-bg"><span class="question-mark">?</span></div>
                    <div class="game-info"><h2 class="pixel-text">Coming Soon...</h2></div>
                </div>
            </div>
        </main>
        
        <footer>
            <p class="pixel-text">© Hakone Game Creator Project</p>
        </footer>
    </div>

    <script>
        function toggleFullScreen(elementId) {
            var elem = document.getElementById(elementId);
            if (!document.fullscreenElement) {
                if (elem.requestFullscreen) {
                    elem.requestFullscreen();
                } else if (elem.webkitRequestFullscreen) { /* Safari */
                    elem.webkitRequestFullscreen();
                } else if (elem.msRequestFullscreen) { /* IE11 */
                    elem.msRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }
    </script>
</body>
</html>
