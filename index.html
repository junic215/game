<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>箱根ゲームクリエイター</title>
    <!-- SFC風ピクセルフォントの読み込み -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1 class="pixel-text shadow-text">箱根ゲームクリエイター</h1>
            <p class="subtitle pixel-text">みんなで作ったゲームで遊ぼう！</p>
        </header>

        <main>
            <div class="game-grid">
                <!-- 1つ目のゲーム（そのまま遊べる） -->
                <div class="game-card">
                    <div class="game-screen playable thumb-square" id="game-container-1">
                        <div class="thumbnail" id="thumb-1" onclick="playGame(1, 'game1/index.html')" style="background-image: url('01.png');">
                        </div>
                        <iframe id="game-iframe-1" width="100%" height="100%" frameborder="0" scrolling="no" style="display:none;"></iframe>
                        <button class="fullscreen-btn" id="fs-btn-1" onclick="toggleFullScreen('game-iframe-1')" style="display:none;">⛶ 全画面</button>
                    </div>
                    <div class="game-info">
                        <h2 class="pixel-text">SUPER UNKO BROTHERS.</h2>
                        <p class="pixel-text">マリオ風！ファイアで敵をたおせ！</p>
                    </div>
                </div>

                <!-- 2つ目のゲーム -->
                <div class="game-card">
                    <div class="game-screen playable thumb-square" id="game-container-2">
                        <div class="thumbnail" id="thumb-2" onclick="playGame(2, 'game2/index.html')" style="background-image: url('02.png');">
                        </div>
                        <iframe id="game-iframe-2" width="100%" height="100%" frameborder="0" scrolling="no" style="display:none;"></iframe>
                        <button class="fullscreen-btn" id="fs-btn-2" onclick="toggleFullScreen('game-iframe-2')" style="display:none;">⛶ 全画面</button>
                    </div>
                    <div class="game-info">
                        <h2 class="pixel-text">しらいっち</h2>
                        <p class="pixel-text">育成ゲーム！ごはんや掃除でお世話しよう！</p>
                    </div>
                </div>

                <!-- 3つ目のゲーム -->
                <div class="game-card">
                    <div class="game-screen playable" id="game-container-3">
                        <iframe src="game3/index.html" id="game-iframe-3" width="100%" height="100%" frameborder="0"
                            scrolling="no"></iframe>
                        <button class="fullscreen-btn" onclick="toggleFullScreen('game-iframe-3')">⛶ 全画面</button>
                    </div>
                    <div class="game-info">
                        <h2 class="pixel-text">だるまさんが転んだ！</h2>
                        <p class="pixel-text">飛んでくるうんこに注意！</p>
                    </div>
                </div>


                <!-- 4つ目のゲーム -->
                <div class="game-card">
                    <div class="game-screen playable" id="game-container-4">
                        <iframe src="game4/index.html" id="game-iframe-4" width="100%" height="100%" frameborder="0"
                            scrolling="no"></iframe>
                        <button class="fullscreen-btn" onclick="toggleFullScreen('game-iframe-4')">⛶ 全画面</button>
                    </div>
                    <div class="game-info">
                        <h2 class="pixel-text">ウンコエアホッケー</h2>
                        <p class="pixel-text">おならで吹き飛ばせ！</p>
                    </div>
                </div>

                <!-- 5つ目のゲーム -->
                <div class="game-card">
                    <div class="game-screen playable" id="game-container-5">
                        <iframe src="game5/index.html" id="game-iframe-5" width="100%" height="100%" frameborder="0"
                            scrolling="no"></iframe>
                        <button class="fullscreen-btn" onclick="toggleFullScreen('game-iframe-5')">⛶ 全画面</button>
                    </div>
                    <div class="game-info">
                        <h2 class="pixel-text">おじキャッチャー</h2>
                        <p class="pixel-text">おじさんをゲットせよ！</p>
                    </div>
                </div>


                <!-- 6つ目のゲーム -->
                <div class="game-card">
                    <div class="game-screen playable" id="game-container-6">
                        <iframe src="game6/index.html" id="game-iframe-6" width="100%" height="100%" frameborder="0"
                            scrolling="no"></iframe>
                        <button class="fullscreen-btn" onclick="toggleFullScreen('game-iframe-6')">⛶ 全画面</button>
                    </div>
                    <div class="game-info">
                        <h2 class="pixel-text">麗しの摩天楼黙示録</h2>
                        <p class="pixel-text">着替えて街へ繰り出せ！おじさん格闘アクション！</p>
                    </div>
                </div>

                <!-- 7つ目のゲーム -->
                <div class="game-card">
                    <div class="game-screen playable" id="game-container-7">
                        <iframe src="game7/game.html" id="game-iframe-7" width="100%" height="100%" frameborder="0"
                            scrolling="no"></iframe>
                        <button class="fullscreen-btn" onclick="toggleFullScreen('game-iframe-7')">⛶ 全画面</button>
                    </div>
                    <div class="game-info">
                        <h2 class="pixel-text">おじさんバトル</h2>
                        <p class="pixel-text">仲間と共闘！巨大顔とスカートおじさんを倒せ！</p>
                    </div>
                </div>
            </div>
        </main>

        <footer>
            <p class="pixel-text">© Hakone Game Creator Project</p>
        </footer>
    </div>

    <script>
        function toggleFullScreen(elementId) {
            var iframe = document.getElementById(elementId);
            var container = iframe.parentElement;
            var btn = container.querySelector('.fullscreen-btn');

            // 疑似フルスクリーン状態なら解除
            if (container.classList.contains('fullscreen-mode')) {
                container.classList.remove('fullscreen-mode');
                // 標準APIのフルスクリーンも解除
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                // ボタンのテキストを戻す
                if (btn) btn.innerText = "⛶ 全画面";
                return;
            }

            // iOSなどフルスクリーンAPIが効かない場合のために、CSSクラスで強制的に全画面化する
            container.classList.add('fullscreen-mode');
            if (btn) btn.innerText = "✖ 閉じる";

            // 一応標準APIも試す (PCやAndroid等向け)
            if (container.requestFullscreen) {
                container.requestFullscreen().catch(err => { });
            } else if (container.webkitRequestFullscreen) {
                container.webkitRequestFullscreen();
            } else if (container.msRequestFullscreen) {
                container.msRequestFullscreen();
            }
        }

        function playGame(id, url) {
            var thumb = document.getElementById('thumb-' + id);
            if(thumb) thumb.style.display = 'none';
            var iframe = document.getElementById('game-iframe-' + id);
            if(iframe) {
                iframe.src = url;
                iframe.style.display = 'block';
            }
            var fsBtn = document.getElementById('fs-btn-' + id);
            if(fsBtn) fsBtn.style.display = 'block';

            // サムネイルクリック時に自動で全画面モードにする
            toggleFullScreen('game-iframe-' + id);
        }
    </script>
</body>

</html>
